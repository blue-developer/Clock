<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Senior Smart Clock</title>
<style>
  :root{
    --bg:#111;
    --fg:#fff;
    --muted:#cfcfcf;
    --card:#1c1c1c;
    --bg-med:#7a0000;
    --bg-bath:#003580;
    --bg-ex:#005a1f;
    --bg-custom:#4a3800;
    --tile-h:220px;
    --tile-radius:16px;
    --tile-gap:14px;
    --bottom-min:180px;
    --today-accent:#4a90d9;
  }


  body{
    margin:0;
    background:var(--bg);
    color:var(--fg);
    font-family:Arial,sans-serif;
    transition:background 180ms linear;
    cursor:none;
  }

  /* Night mode is applied by interpolating CSS custom properties directly —
     no overlay needed. All color transitions are driven by applyNightProgress(). */
  body.alert-med,    body.alert-med    .container { background:var(--bg-med); }
  body.alert-bath,   body.alert-bath   .container { background:var(--bg-bath); }
  body.alert-ex,     body.alert-ex     .container { background:var(--bg-ex); }
  body.alert-custom, body.alert-custom .container { background:var(--bg-custom); }

  .container{
    height:100vh;
    display:flex;
    flex-direction:column;
    padding:40px;
    box-sizing:border-box;
    position:relative;
    transition:background 180ms linear;
  }

  /* Dev controls */
  .controls{
    position:absolute;
    top:18px; right:18px;
    display:none;
    gap:10px;
    z-index:10;
  }
  .controls.visible { display:flex; }
  .btn{
    background:#222;
    border:2px solid #333;
    color:#fff;
    padding:10px 12px;
    font-size:16px;
    border-radius:12px;
    cursor:pointer;
  }
  .btn.secondary{ background:#151515; color:#ddd; }

  /* Clock */
  .clock{ text-align:center; }
  .time-row{
    display:inline-flex;
    align-items:stretch;
    justify-content:center;
    gap:22px;
  }
  .time-wrap{ height:36vh; display:flex; align-items:flex-start; }
  .time{
    font-size:40vh;
    font-weight:900;
    letter-spacing:2px;
    line-height:0.9;
    margin:0;
    white-space:nowrap;
    color:#fff;
  }
  .ampm-col{
    height:36vh;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
  }
  .ampm-col.align-top { justify-content:flex-start; }
  .ampm{
    font-size:20vh;
    font-weight:800;
    line-height:1;
    color:#e0e0e0;
    white-space:nowrap;
  }
  .date{
    font-size:11.25vh;
    margin-top:14px;
    color:#cfcfcf;
    font-weight:800;
    user-select:none;
    cursor:default;
  }

  .spacer{ flex:1; }

  /* Bottom slot */
  .bottom-slot{
    min-height:var(--bottom-min);
    display:flex;
    align-items:stretch;
  }
  .week{
    width:100%;
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:var(--tile-gap);
    align-items:stretch;  /* all tiles same height */
  }
  .day{
    background:var(--card);
    border-radius:var(--tile-radius);
    padding:16px 14px;
    height:var(--tile-h);
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    overflow:hidden; /* never grow beyond fixed height */
  }
  .day.today{
    background:#1c1c1c;
    outline:2px solid var(--today-accent);
  }
  .day-name{
    font-size:3vh;
    font-weight:900;
    color:#f2f2f2;
    margin-bottom:10px;
    letter-spacing:0.3px;
    white-space:nowrap;
  }
  .day.today .day-name{
    color:var(--today-accent);
  }
  .events{ display:flex; flex-direction:column; gap:6px; overflow:hidden; }
  .event{
    font-size:2.2vh;
    line-height:1.25;
    display:-webkit-box;
    -webkit-line-clamp:3;
    line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .event-time{ color:var(--muted); font-size:1.9vh; }
  .more{ font-size:1.9vh; color:#555; margin-top:2px; }
  .no-events{ font-size:2.2vh; color:#555; }
  .stale-banner{
    margin-top:auto;
    padding-top:6px;
    font-size:1.7vh;
    color:#f5c518;
    font-weight:700;
  }


  /* Version watermark */
  #versionWatermark{
    position:fixed;
    bottom:8px; right:12px;
    font-size:11px;
    color:#2a2a2a;
    font-family:monospace;
    pointer-events:none;
    user-select:none;
    z-index:10;
  }

  /* Snow canvas — sits above everything */
  #snowCanvas{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:100;
  }

  /* Reminder takeover — sits above night overlay */
  .reminder-takeover{
    width:100%;
    display:none;
    align-items:center;
    justify-content:center;
    position:relative;
    z-index:10;
  }
  .reminder-card{
    width:100%;
    background:#000;
    border-radius:30px;
    padding:40px;
    box-sizing:border-box;
    text-align:center;
    box-shadow:0 0 80px rgba(255,255,255,0.08);
    transition:background 180ms linear;
  }
  body.alert-med    .reminder-card { background:var(--bg-med); }
  body.alert-bath   .reminder-card { background:var(--bg-bath); }
  body.alert-ex     .reminder-card { background:var(--bg-ex); }
  body.alert-custom .reminder-card { background:var(--bg-custom); }
  .reminder-title{
    font-size:8vh;
    font-weight:900;
    margin:0 0 16px 0;
    letter-spacing:0.6px;
  }
  .reminder-body{ font-size:5vh; font-weight:800; margin:0; }
  .reminder-meta{ margin-top:20px; font-size:3.2vh; color:#cfcfcf; font-weight:700; }
  body.has-reminder .clock{ opacity:0.88; }
</style>
</head>

<body>
<div class="container">

  <div class="controls" id="devControls" aria-label="Developer controls">
    <button class="btn" id="btnMed"  type="button">Medication</button>
    <button class="btn" id="btnBath" type="button">Bathroom</button>
    <button class="btn" id="btnEx"   type="button">Exercise</button>
    <button class="btn secondary" id="btnClear" type="button">Clear</button>
    <button class="btn secondary" id="btnNight" type="button">Night</button>
  </div>

  <div class="clock">
    <div class="time-row" aria-label="Time">
      <div class="time-wrap">
        <div class="time" id="timeText">--:--</div>
      </div>
      <div class="ampm-col" id="ampmCol">
        <div class="ampm" id="ampmText">--</div>
      </div>
    </div>
    <div class="date" id="dateText"></div>
  </div>

  <div class="spacer"></div>

  <div class="bottom-slot" aria-live="assertive">
    <div class="week" id="weekStrip"></div>
    <div class="reminder-takeover" id="reminderTakeover">
      <div class="reminder-card" role="alert">
        <div class="reminder-title" id="remTitle">REMINDER</div>
        <p  class="reminder-body"   id="remBody"></p>
        <div class="reminder-meta"  id="remMeta"></div>
      </div>
    </div>
  </div>

</div>
<canvas id="snowCanvas"></canvas>
<div id="versionWatermark"></div>

<script>
(function(){
'use strict';

// ---------------------------------------------------------------------------
// Settings — config.json provides defaults; localStorage overrides per-key
// ---------------------------------------------------------------------------
let _configDefaults = {};
let _settingsReady = false;
const _settingsReadyCallbacks = [];

fetch('/config.json')
  .then(r => r.ok ? r.json() : {})
  .catch(() => ({}))
  .then(cfg => {
    _configDefaults = cfg;
    _settingsReady = true;
    _settingsReadyCallbacks.forEach(fn => fn());
  });

function onSettingsReady(fn) {
  if (_settingsReady) fn(); else _settingsReadyCallbacks.push(fn);
}

function getSettings() {
  try {
    const local = JSON.parse(localStorage.getItem('clockSettings') || '{}');
    return Object.assign({}, _configDefaults, local);
  } catch { return Object.assign({}, _configDefaults); }
}

const IS_DEV = new URLSearchParams(location.search).get('dev') === '1';
if (IS_DEV) document.getElementById('devControls').classList.add('visible');

// ---------------------------------------------------------------------------
// Clock
// ---------------------------------------------------------------------------
function updateClock() {
  const tz   = getSettings().timezone || 'America/Chicago';
  const now  = new Date();
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, hour: 'numeric', minute: '2-digit', hour12: true,
  }).formatToParts(now);

  const hr  = parts.find(p => p.type === 'hour').value;
  const min = parts.find(p => p.type === 'minute').value;
  const ap  = parts.find(p => p.type === 'dayperiod' || p.type === 'dayPeriod')?.value?.toUpperCase() || 'AM';

  document.getElementById('timeText').textContent = `${hr}:${min}`;
  document.getElementById('ampmText').textContent = ap;
  document.getElementById('ampmCol').classList.toggle('align-top', ap === 'AM');
  document.getElementById('dateText').textContent = now.toLocaleDateString('en-US', {
    timeZone:tz, month:'long', day:'numeric', year:'numeric',
  });
}

setInterval(updateClock, 1000);
updateClock();

// ---------------------------------------------------------------------------
// Minimal iCalendar parser
// Handles VEVENT and VTODO; returns array of { summary, start, allDay, type }
// ---------------------------------------------------------------------------
function parseICS(text) {
  const events = [];
  // Split into components
  const blocks = text.split(/BEGIN:(VEVENT|VTODO)/);
  for (let i = 1; i < blocks.length; i += 2) {
    const type  = blocks[i];
    const block = blocks[i + 1] || '';

    // Unfold lines (RFC 5545: CRLF + whitespace = continuation)
    const unfolded = block.replace(/\r?\n[ \t]/g, '');

    function prop(name) {
      // Match PROPNAME or PROPNAME;PARAM=...: VALUE
      const m = unfolded.match(new RegExp(`^${name}(?:;[^:]*)?:(.+)$`, 'm'));
      return m ? m[1].trim() : null;
    }

    const summary = (prop('SUMMARY') || '').replace(/\\,/g, ',').replace(/\\n/g, ' ');
    // Get the full DTSTART line (with any TZID param) from unfolded block
    const dtstartLine = unfolded.match(/^DTSTART(?:;[^:]*)?:(.+)$/m);
    if (!dtstartLine) continue;
    const dtstart = dtstartLine[1].trim();

    // Extract TZID if present, e.g. DTSTART;TZID=America/New_York:20260325T130000
    const tzidMatch = unfolded.match(/^DTSTART;[^:]*TZID=([^:;]+)/m);
    const dtTzid = tzidMatch ? tzidMatch[1].trim() : null;

    const allDay = /^\d{8}$/.test(dtstart.replace(/VALUE=DATE:/,''));
    let start;
    if (allDay) {
      const d = dtstart.replace(/.*:/, '').replace(/VALUE=DATE:/,'');
      start = new Date(`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}T00:00:00`);
    } else {
      const raw = dtstart.replace(/.*:/, '');
      const iso = `${raw.slice(0,4)}-${raw.slice(4,6)}-${raw.slice(6,8)}T${raw.slice(9,11)}:${raw.slice(11,13)}:${raw.slice(13,15)}`;
      if (raw.endsWith('Z')) {
        // Explicit UTC
        start = new Date(iso + 'Z');
      } else {
        // Use TZID if the browser recognises it, otherwise fall back to display timezone
        let tz = getSettings().timezone || 'America/Los_Angeles';
        if (dtTzid) {
          try { Intl.DateTimeFormat('en-US', { timeZone: dtTzid }); tz = dtTzid; } catch (_) {}
        }
        // Convert wall-clock time in `tz` to UTC.
        // toLocaleString gives us the wall time in tz; parse it as UTC to get the gap.
        const seed = new Date(iso + 'Z');
        const wallStr = seed.toLocaleString('sv-SE', { timeZone: tz }); // "YYYY-MM-DD HH:MM:SS"
        const wallAsUtc = new Date(wallStr.replace(' ', 'T') + 'Z').getTime();
        const offsetMs = seed.getTime() - wallAsUtc;
        start = new Date(seed.getTime() + offsetMs);
      }
    }

    if (isNaN(start)) continue;
    events.push({ summary, start, allDay, type });
  }
  return events;
}

// ---------------------------------------------------------------------------
// Week rendering
// ---------------------------------------------------------------------------
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function getWeekStart(tz) {
  const now     = new Date();
  const dowStr  = now.toLocaleDateString('en-US', { timeZone:tz, weekday:'short' });
  const dow     = { Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6 }[dowStr] ?? 0;
  const dateStr = now.toLocaleDateString('en-US', { timeZone:tz, year:'numeric', month:'2-digit', day:'2-digit' });
  const [m,d,y] = dateStr.split('/');
  // Noon UTC on today's calendar date in tz (avoids DST midnight issues)
  const noonUTC = new Date(`${y}-${m}-${d}T12:00:00Z`);
  return new Date(noonUTC.getTime() - dow * 86400000); // Sunday noon UTC
}

function renderWeek(events, stale) {
  const tz        = getSettings().timezone || 'America/Chicago';
  const weekStart = getWeekStart(tz);
  const now       = new Date();
  const todayStr  = now.toLocaleDateString('en-US', { timeZone:tz, year:'numeric', month:'2-digit', day:'2-digit' });

  // Build 7 buckets
  const days = DAY_NAMES.map((name, i) => {
    const dayNoon   = new Date(weekStart.getTime() + i * 86400000);
    const dayStr    = dayNoon.toLocaleDateString('en-US', { timeZone:tz, year:'numeric', month:'2-digit', day:'2-digit' });
    return { name, isToday: dayStr === todayStr, dayNoon, events: [] };
  });

  // Place events into buckets
  for (const ev of events) {
    const evDayStr = ev.start.toLocaleDateString('en-US', { timeZone:tz, year:'numeric', month:'2-digit', day:'2-digit' });
    const bucket   = days.find(d =>
      d.dayNoon.toLocaleDateString('en-US', { timeZone:tz, year:'numeric', month:'2-digit', day:'2-digit' }) === evDayStr
    );
    if (!bucket) continue;

    const timeLabel = ev.allDay ? '' : ev.start.toLocaleTimeString('en-US', {
      timeZone:tz, hour:'numeric', minute:'2-digit', hour12:true,
    });
    bucket.events.push({ title: ev.summary, time: timeLabel, start: ev.start, allDay: ev.allDay });
  }

  // Sort by time within each day
  for (const day of days) {
    day.events.sort((a,b) => (a.time||'').localeCompare(b.time||''));
  }

  // Render
  const strip = document.getElementById('weekStrip');
  strip.innerHTML = '';
  for (const day of days) {
    const tile = document.createElement('div');
    tile.className = 'day' + (day.isToday ? ' today' : '');

    const nameEl = document.createElement('div');
    nameEl.className = 'day-name';
    nameEl.textContent = day.name;
    tile.appendChild(nameEl);

    const evEl = document.createElement('div');
    evEl.className = 'events';

    // On today's tile, hide events that have already passed (all-day events always show)
    const now = new Date();
    const visibleEvents = day.isToday
      ? day.events.filter(ev => ev.allDay || !ev.start || ev.start >= now)
      : day.events;

    if (visibleEvents.length) {
      const shown = visibleEvents.slice(0, 2);
      const extra = visibleEvents.length - shown.length;
      for (const ev of shown) {
        const e = document.createElement('div');
        e.className = 'event';
        e.textContent = ev.time ? `${ev.time} – ${ev.title}` : ev.title;
        evEl.appendChild(e);
      }
      if (extra > 0) {
        const m = document.createElement('div');
        m.className = 'more';
        m.textContent = `+${extra} more`;
        evEl.appendChild(m);
      }
    } else {
      const ne = document.createElement('div');
      ne.className = 'no-events';
      ne.textContent = day.isToday ? 'Done for today' : 'No events';
      evEl.appendChild(ne);
    }
    tile.appendChild(evEl);

    // Stale-state banner — only on today's tile
    if (day.isToday && stale) {
      const banner = document.createElement('div');
      banner.className = 'stale-banner';
      banner.textContent = '⚠️ Connection Lost';
      tile.appendChild(banner);
    }

    strip.appendChild(tile);
  }

  // Re-apply night colors to freshly created DOM nodes
  if (_nightProgress > 0) applyNightProgress(_nightProgress);
}

// Start with empty week immediately
renderWeek([]);

// ---------------------------------------------------------------------------
// Reminder detection
// ---------------------------------------------------------------------------
function classifyReminder(title) {
  const t = title.toLowerCase();
  if (t.includes('medication') || t.includes('medicine') || t.includes('med') || t.includes('pill') || t.includes('drug')) return 'med';
  if (t.includes('bathroom')   || t.includes('bath')     || t.includes('toilet') || t.includes('restroom') || t.includes('lavatory')) return 'bath';
  if (t.includes('exercise')   || t.includes('workout')  || t.includes('walk') || t.includes('stretch') || t.includes('physical')) return 'ex';
  return 'custom';
}

const REMINDER_BODIES = {
  med:    'Please take your medicine now.',
  bath:   'It is time to use the bathroom.',
  ex:     'Please do your gentle exercises.',
  custom: '',
};

const firedIds = new Set();

function checkReminders(events) {
  const now     = new Date();
  const horizon = 60 * 1000; // fire within ±60 seconds of start time
  for (const ev of events) {
    const id   = `${ev.summary}|${ev.start.toISOString()}`;
    if (firedIds.has(id)) continue;
    const diff = Math.abs(ev.start.getTime() - now.getTime());
    if (diff <= horizon) {
      firedIds.add(id);
      const type = classifyReminder(ev.summary);
      showReminder({
        type,
        title: ev.summary.toUpperCase(),
        body:  REMINDER_BODIES[type] || ev.summary,
        meta:  'Press the large button when finished.',
      });
      break; // one at a time
    }
  }
}

// ---------------------------------------------------------------------------
// ICS fetch & refresh
// ---------------------------------------------------------------------------

// Route through local proxy when served from localhost (avoids CORS block).
function icsUrl(raw) {
  const normalized = raw.replace(/^webcal:\/\//i, 'https://');
  if (location.protocol === 'http:' && location.hostname === 'localhost') {
    return `/proxy?url=${encodeURIComponent(normalized)}`;
  }
  return normalized;
}

let cachedCalendarEvents  = [];
let cachedReminderEvents  = [];
let _calendarStale        = false; // true when last fetch failed

async function fetchFeed(rawUrl) {
  if (!rawUrl) return [];
  const res = await fetch(icsUrl(rawUrl));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return parseICS(await res.text());
}

async function fetchAndRender() {
  const settings = getSettings();
  // Support old single-URL setting for backwards compatibility
  const calRaw  = settings.icsCalendarUrl  || settings.icsUrl || '';
  const remRaw  = settings.icsRemindersUrl || '';

  if (!calRaw) {
    cachedCalendarEvents = [];
    _calendarStale = false;
    renderWeek([]);
    console.warn('[clock] No calendar URL configured.');
  } else {
    try {
      cachedCalendarEvents = await fetchFeed(calRaw);
      _calendarStale = false;
      renderWeek(cachedCalendarEvents);
    } catch (err) {
      console.warn('[clock] Calendar ICS fetch failed:', err.message);
      // Stale state — keep last known events visible; show banner on today's tile
      _calendarStale = true;
      renderWeek(cachedCalendarEvents, true);
    }
  }

  try {
    cachedReminderEvents = remRaw ? await fetchFeed(remRaw) : [];
  } catch (err) {
    console.warn('[clock] Reminders ICS fetch failed:', err.message);
  }

  // If no separate reminders feed, fall back to checking calendar events
  checkReminders(remRaw ? cachedReminderEvents : cachedCalendarEvents);
}

function startPolling() {
  fetchAndRender();
  const mins = Math.max(1, parseInt(getSettings().pollIntervalMinutes, 10) || 5);
  // Re-fetch on the configured interval
  const fetchTimer = setInterval(fetchAndRender, mins * 60 * 1000);
  // Re-render every minute so past events drop off today's tile in real time
  const renderTimer = setInterval(() => { renderWeek(cachedCalendarEvents, _calendarStale); }, 60 * 1000);
  // Check cached events for due reminders every 30s — independent of fetch interval
  const reminderTimer = setInterval(() => {
    const settings = getSettings();
    const remRaw = settings.icsRemindersUrl || '';
    checkReminders(remRaw ? cachedReminderEvents : cachedCalendarEvents);
  }, 30 * 1000);
  return { fetchTimer, renderTimer, reminderTimer };
}

let timers;
onSettingsReady(() => { timers = startPolling(); });

// Re-start polling when settings change (written by settings.html)
window.addEventListener('storage', (e) => {
  if (e.key === 'clockSettings') {
    if (timers) { clearInterval(timers.fetchTimer); clearInterval(timers.renderTimer); clearInterval(timers.reminderTimer); }
    updateClock();    // timezone may have changed
    timers = startPolling();
  }
});

// ---------------------------------------------------------------------------
// Reminder UI
// ---------------------------------------------------------------------------
function setAlertBg(kind) {
  document.body.classList.remove('alert-med','alert-bath','alert-ex','alert-custom');
  if (kind === 'med')    document.body.classList.add('alert-med');
  if (kind === 'bath')   document.body.classList.add('alert-bath');
  if (kind === 'ex')     document.body.classList.add('alert-ex');
  if (kind === 'custom') document.body.classList.add('alert-custom');
}

function setBottomMode(mode) {
  const isReminder = mode === 'reminder';
  document.getElementById('weekStrip').style.display      = isReminder ? 'none' : 'grid';
  document.getElementById('reminderTakeover').style.display = isReminder ? 'flex' : 'none';
  document.body.classList.toggle('has-reminder', isReminder);
}

function showReminder(d) {
  document.getElementById('remTitle').textContent = d.title || 'REMINDER';
  document.getElementById('remBody').textContent  = d.body  || '';
  document.getElementById('remMeta').textContent  = d.meta  || '';
  setBottomMode('reminder');
  setAlertBg(d.type);
}

function clearReminder() {
  setBottomMode('week');
  setAlertBg(null);
}

// ---------------------------------------------------------------------------
// Poll /clear-pending so an iPhone Shortcut can dismiss the reminder
// ---------------------------------------------------------------------------
async function pollClearPending() {
  try {
    const res = await fetch('/clear-pending');
    if (res.ok) {
      const data = await res.json();
      if (data.clear) clearReminder();
    }
  } catch (_) { /* server not reachable — ignore */ }
}
setInterval(pollClearPending, 3000);

// ---------------------------------------------------------------------------
// Dev controls
// ---------------------------------------------------------------------------
const devControls = document.getElementById('devControls');

function showDevControls() {
  devControls.classList.add('visible');
}
function hideDevControls() {
  devControls.classList.remove('visible');
}

// Show on ?dev=1 at load
if (IS_DEV) showDevControls();

// Shift+D toggles dev buttons (works in kiosk mode with a keyboard)
window.addEventListener('keydown', e => {
  if (e.shiftKey && e.key === 'D') {
    devControls.classList.toggle('visible');
  }
});

const devTrigger = (type, title, body) => () => showReminder({ type, title, body, meta:'Press the large button when finished.' });
document.getElementById('btnMed').addEventListener('click',  devTrigger('med',  'MEDICATION TIME', 'Please take your medicine now.'));
document.getElementById('btnBath').addEventListener('click', devTrigger('bath', 'BATHROOM BREAK',  'It is time to use the bathroom.'));
document.getElementById('btnEx').addEventListener('click',   devTrigger('ex',   'EXERCISE TIME',   'Please do your gentle exercises.'));
document.getElementById('btnClear').addEventListener('click', clearReminder);

// ---------------------------------------------------------------------------
// Secret settings access — 5 clicks on the date within 3 seconds
// ---------------------------------------------------------------------------
let dateClickCount = 0;
let dateClickTimer = null;

document.getElementById('dateText').addEventListener('click', () => {
  dateClickCount++;
  clearTimeout(dateClickTimer);
  if (dateClickCount >= 5) {
    dateClickCount = 0;
    window.location.href = '/settings.html';
  } else {
    dateClickTimer = setTimeout(() => { dateClickCount = 0; }, 3000);
  }
});

// Space = acknowledge reminder
window.addEventListener('keydown', e => { if (e.code === 'Space') clearReminder(); });


// ---------------------------------------------------------------------------
// Night mode — direct CSS custom property interpolation
// ---------------------------------------------------------------------------
// Rather than an overlay, we interpolate every visible color from its day
// value toward a red-tinted night value as _nightProgress goes 0 → 1.
// This means each color keeps its own distinct hue relationship — the blue
// today-accent becomes a warm amber/red rather than being washed out.

// Day palette (matches :root CSS vars and hardcoded element colors)
const DAY_COLORS = {
  bg:           [17,  17,  17],   // #111
  fg:           [255, 255, 255],  // #fff
  muted:        [207, 207, 207],  // #cfcfcf
  card:         [28,  28,  28],   // #1c1c1c
  todayAccent:  [74,  144, 217],  // #4a90d9
};

// Night palette — red theme
const NIGHT_COLORS_RED = {
  bg:           [18,  4,   4],    // near-black with red tint
  fg:           [255, 120, 80],   // warm red-orange
  muted:        [180, 80,  60],   // muted red
  card:         [30,  10,  10],   // very dark red card
  todayAccent:  [210, 100, 40],   // amber-orange (visible, not cancelled)
};

// Night palette — blue theme
const NIGHT_COLORS_BLUE = {
  bg:           [4,   10,  22],   // near-black with blue tint
  fg:           [100, 180, 255],  // cool blue-white
  muted:        [70,  130, 190],  // muted blue
  card:         [8,   18,  35],   // very dark blue card
  todayAccent:  [60,  230, 200],  // teal/cyan — distinct from blue bg, not cancelled
};

function lerpColor(a, b, t) {
  return [
    Math.round(a[0] + (b[0] - a[0]) * t),
    Math.round(a[1] + (b[1] - a[1]) * t),
    Math.round(a[2] + (b[2] - a[2]) * t),
  ];
}

function rgb(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }

// Current animated progress: 0 = full day, 1 = full night
let _nightProgress = 0;
let _nightRafId    = null;
let _nightRampStart   = null;
let _nightRampFrom    = 0;
let _nightRampTo      = 0;
let _nightRampDuration = 4000; // ms; overridden to 17.5min for solar ramp

function easeInOut(t) {
  return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
}

function applyNightProgress(p) {
  _nightProgress = Math.max(0, Math.min(1, p));
  const settings = getSettings();
  const theme = (settings.nightModeColor || 'red') === 'blue' ? 'blue' : 'red';
  const NIGHT = theme === 'blue' ? NIGHT_COLORS_BLUE : NIGHT_COLORS_RED;
  const t = _nightProgress;

  const root = document.documentElement;
  root.style.setProperty('--bg',           rgb(lerpColor(DAY_COLORS.bg,          NIGHT.bg,          t)));
  root.style.setProperty('--fg',           rgb(lerpColor(DAY_COLORS.fg,          NIGHT.fg,          t)));
  root.style.setProperty('--muted',        rgb(lerpColor(DAY_COLORS.muted,       NIGHT.muted,       t)));
  root.style.setProperty('--card',         rgb(lerpColor(DAY_COLORS.card,        NIGHT.card,        t)));
  root.style.setProperty('--today-accent', rgb(lerpColor(DAY_COLORS.todayAccent, NIGHT.todayAccent, t)));

  // Hardcoded element colors that don't use CSS vars
  const timeFg   = rgb(lerpColor([255,255,255], NIGHT.fg,    t));
  const ampmFg   = rgb(lerpColor([224,224,224], NIGHT.muted, t));
  const dateFg   = rgb(lerpColor([207,207,207], NIGHT.muted, t));
  const dayNameFg= rgb(lerpColor([242,242,242], NIGHT.fg,    t));

  // Apply to live elements
  const timeEl = document.getElementById('timeText');
  const ampmEl = document.getElementById('ampmText');
  const dateEl = document.getElementById('dateText');
  if (timeEl) timeEl.style.color = timeFg;
  if (ampmEl) ampmEl.style.color = ampmFg;
  if (dateEl) dateEl.style.color = dateFg;

  // Day-name elements in the week strip
  document.querySelectorAll('.day-name').forEach(el => {
    // today's day-name uses --today-accent (already updated via CSS var); others use dayNameFg
    if (!el.closest('.today')) el.style.color = dayNameFg;
  });

  // Keep class in sync for any CSS that still keys off it
  document.documentElement.classList.toggle('night-mode', _nightProgress > 0.5);
  document.documentElement.classList.toggle('night-blue', _nightProgress > 0.5 && theme === 'blue');
}

function startNightRamp(toProgress, durationMs) {
  if (_nightRafId) cancelAnimationFrame(_nightRafId);
  _nightRampFrom     = _nightProgress;
  _nightRampTo       = toProgress;
  _nightRampDuration = durationMs;
  _nightRampStart    = null;

  function step(ts) {
    if (!_nightRampStart) _nightRampStart = ts;
    const elapsed = ts - _nightRampStart;
    const t = Math.min(elapsed / _nightRampDuration, 1);
    applyNightProgress(_nightRampFrom + (_nightRampTo - _nightRampFrom) * easeInOut(t));
    if (t < 1) {
      _nightRafId = requestAnimationFrame(step);
    } else {
      _nightRafId = null;
    }
  }
  _nightRafId = requestAnimationFrame(step);
}

// Returns sunrise and sunset as fractional hours (e.g. 6.5 = 6:30 AM)
// for the given Date in the given IANA timezone.
// Uses the NOAA simplified solar algorithm (accurate to ~minutes).
function solarTimes(date, tz) {
  // Get the calendar date in the target timezone
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, year:'numeric', month:'numeric', day:'numeric',
  }).formatToParts(date);
  const y = +parts.find(p=>p.type==='year').value;
  const m = +parts.find(p=>p.type==='month').value;
  const d = +parts.find(p=>p.type==='day').value;

  // Julian Day Number
  const JD = 367*y - Math.floor(7*(y+Math.floor((m+9)/12))/4)
           + Math.floor(275*m/9) + d + 1721013.5;

  // Julian centuries from J2000
  const T  = (JD - 2451545.0) / 36525;

  // Geometric mean longitude / anomaly of sun (degrees)
  const L0 = (280.46646 + T*(36000.76983 + T*0.0003032)) % 360;
  const M  = 357.52911 + T*(35999.05029 - T*0.0001537);
  const Mr = M * Math.PI / 180;

  // Equation of centre
  const C  = Math.sin(Mr)*(1.914602 - T*(0.004817+0.000014*T))
           + Math.sin(2*Mr)*(0.019993 - 0.000101*T)
           + Math.sin(3*Mr)*0.000289;

  const SunLon = L0 + C;                         // sun's true longitude (deg)
  const f      = (SunLon - 282.9404 - 4.84940e-5 * T); // true anomaly proxy
  const e      = 0.016708634 - T*(0.000042037 + 0.0000001267*T); // eccentricity

  // Sun's right ascension
  const lambda = SunLon - 0.00569 - 0.00478 * Math.sin((125.04 - 1934.136*T)*Math.PI/180);
  const epsilon = (23.439291 - T*0.013004) * Math.PI / 180;
  const RA  = Math.atan2(Math.cos(epsilon)*Math.sin(lambda*Math.PI/180),
                          Math.cos(lambda*Math.PI/180)) * 180 / Math.PI;

  // Declination
  const decl = Math.asin(Math.sin(epsilon)*Math.sin(lambda*Math.PI/180));

  // Equation of time (minutes)
  const RA_norm = ((RA/15) % 24 + 24) % 24;   // hours
  const EqT = 4*(L0 - 0.0057183 - RA_norm*15
              + 0.00478*Math.sin((125.04 - 1934.136*T)*Math.PI/180)*180/Math.PI);

  // Derive UTC offset for this timezone on this date using Intl (DST-safe)
  const tzOffsetMin = (() => {
    const ref = new Date(Date.UTC(y, m-1, d, 12));
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: tz, hour: 'numeric', minute: 'numeric', hour12: false,
    }).formatToParts(ref);
    const h = +parts.find(p => p.type === 'hour').value;
    const mn = +parts.find(p => p.type === 'minute').value;
    const localMinutes = h * 60 + mn;
    return 12 * 60 - localMinutes; // minutes behind UTC (positive = west)
  })();
  const tzOffsetHrs = -tzOffsetMin / 60;
  const lonEst      = tzOffsetHrs * 15; // approximate longitude

  // Solar noon (hours, local standard time)
  const solarNoon = 12 - lonEst/15 - EqT/60 + tzOffsetHrs;

  // Hour angle for sunrise/sunset (zenith = 90.833°)
  const latRad  = decl; // we don't know exact lat — use declination as proxy fallback
  // Without GPS we can't get exact latitude; derive approximate lat from timezone name
  // heuristic: mid-latitude 40°N as fallback, good enough for ±20 min accuracy
  const lat = 40 * Math.PI / 180;
  const cosH = (Math.cos(90.833*Math.PI/180) - Math.sin(lat)*Math.sin(decl))
             / (Math.cos(lat)*Math.cos(decl));

  if (cosH < -1) return { sunrise: 0,    sunset: 24 };   // midnight sun
  if (cosH >  1) return { sunrise: 12,   sunset: 12 };   // polar night

  const H = Math.acos(cosH) * 180 / Math.PI / 15; // hours

  return {
    sunrise: solarNoon - H,
    sunset:  solarNoon + H,
  };
}

// Parse "HH:MM" → fractional hours, or null
function parseHHMM(str) {
  const m = (str||'').match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  return parseInt(m[1],10) + parseInt(m[2],10)/60;
}

// Return fractional hour for the current moment in the given timezone
function localHourNow(tz) {
  const now = new Date();
  const str = now.toLocaleTimeString('en-US', { timeZone: tz, hour:'numeric', minute:'2-digit', second:'2-digit', hour12:false });
  const [h,mn,s] = str.split(':').map(Number);
  return h + mn/60 + s/3600;
}

// Instant snap (dev preview — 4 second fade)
function applyNightMode(on) {
  startNightRamp(on ? 1 : 0, 4000);
}

// Solar ramp — 17.5 minutes (middle of the requested 15–20 min range)
function startRamp(toNight) {
  startNightRamp(toNight ? 1 : 0, 17.5 * 60 * 1000);
}

// Night scheduler — runs every 30 seconds, triggers ramp at sunrise/sunset
let _lastNightState = null;
function tickNightMode() {
  const settings  = getSettings();

  // If night mode is disabled, ensure we're in day mode and bail
  if (settings.nightModeEnabled === false) {
    if (_lastNightState !== false) {
      _lastNightState = false;
      startNightRamp(0, 4000);
    }
    return;
  }

  const tz        = settings.timezone || 'America/Chicago';
  const now       = new Date();
  const hourNow   = localHourNow(tz);

  let sunrise, sunset;
  const srOverride = parseHHMM(settings.sunriseOverride);
  const ssOverride = parseHHMM(settings.sunsetOverride);

  if (srOverride !== null && ssOverride !== null) {
    sunrise = srOverride;
    sunset  = ssOverride;
  } else {
    const solar = solarTimes(now, tz);
    sunrise = srOverride !== null ? srOverride : solar.sunrise;
    sunset  = ssOverride !== null ? ssOverride : solar.sunset;
  }

  // Night = before sunrise or after sunset
  const shouldBeNight = hourNow < sunrise || hourNow >= sunset;

  if (_lastNightState === null) {
    // First run — apply immediately with no ramp
    applyNightMode(shouldBeNight);
    _lastNightState = shouldBeNight;
    return;
  }

  if (shouldBeNight !== _lastNightState) {
    _lastNightState = shouldBeNight;
    startRamp(shouldBeNight);
  }
}

setInterval(tickNightMode, 30 * 1000);
onSettingsReady(tickNightMode);

// Re-apply theme when settings change (e.g. color choice saved in settings page)
window.addEventListener('storage', () => {
  _lastNightState = null; // force re-evaluate
  tickNightMode();
});

// Dev night toggle — instant preview (4s fade, bypasses 15-min ramp)
document.getElementById('btnNight').addEventListener('click', () => {
  const goNight = _nightProgress < 0.5;
  _lastNightState = goNight;
  applyNightMode(goNight);
  document.getElementById('btnNight').textContent = goNight ? 'Day' : 'Night';
});

// ---------------------------------------------------------------------------
// Auto-reload when a new git version is deployed
// ---------------------------------------------------------------------------
let _deployedVersion = null;
async function checkVersion() {
  try {
    const res = await fetch('/version');
    if (!res.ok) return;
    const { version } = await res.json();
    if (_deployedVersion === null) {
      _deployedVersion = version;
      document.getElementById('versionWatermark').textContent = 'v' + version;
      return;
    }
    if (version !== _deployedVersion) location.reload();
  } catch (_) {}
}
setInterval(checkVersion, 60 * 1000);
checkVersion();




})();
</script>
